<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LEVEL DEVIL — not a troll game</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="stage">
  <canvas id="game" width="960" height="540"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-left">
      <span id="hud-levelnum" class="pill">1</span>
      <span id="hud-levelname">NOTHING TO SEE HERE</span>
    </div>
    <div class="hud-right">
      <span class="skull">&#9760;</span><span id="hud-deaths">0</span>
      <span class="hint">R&nbsp;restart&nbsp;&middot;&nbsp;M&nbsp;mute</span>
    </div>
  </div>

  <!-- MENU -->
  <div id="menu">
    <div class="devil-face">
      <div class="horn left"></div>
      <div class="horn right"></div>
      <div class="face">
        <div class="eye l"></div>
        <div class="eye r"></div>
        <div class="grin"></div>
      </div>
    </div>
    <h1 class="title"><span>L</span><span>E</span><span>V</span><span>E</span><span>L</span>&nbsp;<span>D</span><span>E</span><span>V</span><span>I</span><span>L</span></h1>
    <p class="subtitle">not a troll game. promise. <span class="wink">;)</span></p>
    <button id="play-btn">PLAY</button>
    <div id="level-grid"></div>
    <p class="menu-deaths">total deaths: <span id="menu-deaths">0</span></p>
    <p class="controls-hint">&larr; &rarr; / A D to move &nbsp;&middot;&nbsp; &uarr; / W / SPACE to jump</p>
  </div>

  <!-- END SCREEN -->
  <div id="end-screen" class="hidden">
    <h1 class="end-title">YOU BEAT<br>THE DEVIL</h1>
    <p class="end-sub">...this time.</p>
    <p class="end-stats">you died <span id="end-deaths">0</span> times. <span id="end-roast"></span></p>
    <button id="end-menu-btn">BACK TO MENU</button>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
